name: Build and Deploy to Azure App Service (via GHCR)

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # GitHub 레포지토리 이름을 소문자로 변환하여 이미지 이름으로 사용
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # GHCR(GitHub Container Registry)에 이미지를 Push하기 위한 필수 권한 부여
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. GitHub Container Registry 로그인 (내장된 GITHUB_TOKEN 사용)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. Docker 이미지 빌드 및 GHCR로 Push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 태그 예시: ghcr.io/0xkwang/docker-github:latest
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # 3. Publish Profile을 이용한 Azure App Service 배포
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'my-docker-app' # ⚠️ 실제 Azure App Service 이름으로 반드시 수정할 것
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest'