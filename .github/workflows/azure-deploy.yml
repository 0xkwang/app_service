name: Build and Deploy to Azure App Service (via GHCR)

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # GitHub 레포지토리 이름을 소문자로 변환하여 이미지 이름으로 사용
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # GHCR(GitHub Container Registry)에 이미지를 Push하기 위한 필수 권한 부여
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. GitHub Container Registry 로그인 (내장된 GITHUB_TOKEN 사용)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

     # (앞부분 Checkout 및 Build 스텝은 그대로 유지)

      # 2. Docker 이미지 빌드 및 GHCR로 Push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # 3. 멍청한 공식 Action 대신, Webhook을 직접 타격하여 Azure에 배포 명령 하달
      - name: Trigger Azure App Service Webhook
        run: |
          curl -X POST -d "" "${{ secrets.AZURE_WEBHOOK_URL }}"
          echo "Webhook 트리거 완료. Azure가 백그라운드에서 새 이미지를 Pull 합니다."