name: Docker Build & Deploy to Azure App Service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: myregistry.azurecr.io
  IMAGE_NAME: docker-azure-app
  AZURE_APP_NAME: my-docker-app
  AZURE_RESOURCE_GROUP: st707-githubactions-azureserver

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🔐 Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}
      
      - name: 📝 Extract metadata for Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            latest
      
      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
  
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🔐 Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: 🚀 Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_APP_NAME }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      
      - name: ⏳ Wait for deployment
        run: sleep 30
      
      - name: ✅ Verify deployment
        run: |
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ env.AZURE_APP_NAME }}.azurewebsites.net/health")
          
          if [ "$HEALTH_STATUS" = "200" ]; then
            echo "✅ 배포 성공! App Service가 정상 작동 중입니다."
            echo "🌐 접속 URL: https://${{ env.AZURE_APP_NAME }}.azurewebsites.net"
          else
            echo "❌ 배포 실패! HTTP 상태 코드: $HEALTH_STATUS"
            exit 1
          fi
      
      - name: 📊 Log deployment summary
        run: |
          echo "=================================="
          echo "✅ CI/CD 파이프라인 완료!"
          echo "=================================="
          echo "이미지: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "App Service: ${{ env.AZURE_APP_NAME }}"
          echo "URL: https://${{ env.AZURE_APP_NAME }}.azurewebsites.net"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo "=================================="

permissions:
  contents: read
  packages: write
