name: Build and Deploy Docker App to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # 주의: 리포지토리 이름이 대문자를 포함할 경우 Docker 빌드 에러가 발생하므로, 소문자로 강제 변환 필요
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # GHCR에 패키지를 Push하기 위한 필수 권한 부여

    steps:
      - name: 1. 저장소 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: 2. GHCR (GitHub Container Registry) 인증
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # 개인이 발급한 PAT(ghp_...) 대신 액션 런타임이 발급하는 일회성 토큰 사용 (SSO 차단 원천 회피)
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. 대문자 방지 및 이미지 이름 소문자화 (Sanitization)
        run: echo "IMAGE_NAME=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: 4. Docker 이미지 빌드 및 GHCR Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: 5. Azure Web App SCM 엔진 다이렉트 트리거
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'my-docker-app' # 실제 Azure App Service 이름으로 변경 필수
          # Azure 포털에서 다운받은 Publish Profile 내용을 깃허브 Secrets에 저장 후 호출
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest'