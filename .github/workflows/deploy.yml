name: Build and Deploy Python App to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 저장소 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: 2. Python 3.11 런타임 환경 구성
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 도커 빌드 과정 전부 삭제 완료. 순수 코드만 압축해서 Kudu 백도어로 전송.
      - name: 3. Azure Web App Kudu 엔진 다이렉트 트리거 (ZipDeploy)
        uses: azure/webapps-deploy@v3 # 파싱 버그가 해결된 최신 v3 엔진 사용
        with:
          app-name: my-python-app-1234
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: . # 도커 이미지가 아닌, 현재 디렉토리의 소스코드 전체를 압축해서 전송