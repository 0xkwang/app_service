name: Deploy Docker App to Azure Web App

on:
  push:
    branches: [ "main" ]

# 환경 변수 설정 (본인의 환경에 맞게 소문자로 수정 필요)
env:
  AZURE_WEBAPP_NAME: '본인의-웹앱-이름' 
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # 컨테이너 레지스트리(GHCR) 접근 권한 부여
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        # GITHUB_TOKEN은 깃허브가 자동으로 발급하는 내부 권한 토큰입니다 (따로 만들 필요 없음)
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # 이미지 태그를 깃허브 레포지토리명:최신(latest)으로 지정
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

    - name: Azure Login (Service Principal)
      uses: azure/login@v1
      with:
        # 우리가 아까 등록한 JSON 형태의 토큰 시크릿 사용 (401 에러 원천 차단)
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        # Kudu를 통한 소스코드 전송이 아닌, 만들어진 컨테이너 이미지를 다운로드하라고 지시
        images: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest'